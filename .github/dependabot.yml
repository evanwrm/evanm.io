version: 2
updates:
    - package-ecosystem: "npm"
      directory: "/"
      schedule:
          interval: "monthly"
      open-pull-requests-limit: 10
    - package-ecosystem: "npm"
      directory: "/packages/api"
      schedule:
          interval: "monthly"
      open-pull-requests-limit: 10
    - package-ecosystem: "npm"
      directory: "/packages/web"
      schedule:
          interval: "monthly"
      open-pull-requests-limit: 10
