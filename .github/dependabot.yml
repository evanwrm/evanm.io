version: 2
updates:
    - package-ecosystem: "npm"
      directory: "/"
      schedule:
          interval: "monthly"
      open-pull-requests-limit: 10
    - package-ecosystem: "npm"
      directory: "/apps/api"
      schedule:
          interval: "monthly"
      open-pull-requests-limit: 10
    - package-ecosystem: "npm"
      directory: "/apps/web"
      schedule:
          interval: "monthly"
      open-pull-requests-limit: 10
